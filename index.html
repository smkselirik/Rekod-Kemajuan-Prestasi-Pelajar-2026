<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Rekod Kemajuan Prestasi Pelajar - SMK Selirik</title>
    <style>
        /* ASAS & LATAR BELAKANG */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); /* Biru Lembut Gradient */
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER KORPORAT */
        .main-header {
            background-color: #151B54; /* Night Blue */
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 4px); /* Corak Abstrak Elegant */
            color: white;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .main-header img.logo {
            height: 100px;
            margin-bottom: 10px;
        }
        .main-header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .main-header h2 {
            margin: 5px 0 0;
            font-size: 18px;
            font-weight: 300;
        }

        /* FOOTER */
        .main-footer {
            background-color: #151B54;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: auto;
            font-size: 14px;
        }

        /* LOG MASUK */
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 350px;
            margin: 50px auto;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .login-container button, .action-btn {
            background-color: #151B54;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }
        .login-container button:hover, .action-btn:hover {
            background-color: #212c7a;
        }

        /* DASHBOARD KAWALAN */
        .dashboard-container {
            display: none; /* Disembunyikan sehingga log masuk */
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .controls-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
        }
        .controls-card select {
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            margin: 10px;
        }
        .print-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .print-controls button {
            width: auto;
            background-color: #2e8b57; /* Sea Green */
        }

        /* PAPARAN KAD & SLIP */
        .slip-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            overflow: hidden;
            page-break-inside: avoid;
        }
        .slip-header-img {
            width: 100%;
            display: block;
            border-bottom: 3px solid #151B54;
        }
        .slip-content {
            padding: 20px;
        }
        .student-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        
        /* JADUAL MARKAH */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th {
            background-color: #151B54;
            color: white;
            padding: 10px;
            text-align: left;
        }
        td {
            padding: 8px 10px;
            text-align: left;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }

        /* TANDATANGAN */
        .signatures {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
        }
        .sign-box {
            text-align: center;
            width: 40%;
        }
        .sign-line {
            border-bottom: 1px solid #333;
            margin-bottom: 5px;
            height: 50px;
        }

        /* JADUAL KESELURUHAN (LANDSCAPE) */
        .summary-table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            overflow-x: auto;
            display: none;
        }

        /* PENGURUSAN CETAKAN (PRINT MEDIA QUERIES) */
        @media print {
            body { background: white; margin: 0; }
            .main-header, .main-footer, .login-container, .controls-card { display: none !important; }
            .dashboard-container { margin: 0; padding: 0; max-width: 100%; }
            
            /* Pukal / Individu */
            .print-slips .slip-card {
                box-shadow: none;
                border: none;
                border-radius: 0;
                margin-bottom: 0;
                page-break-after: always; /* Pastikan pukal tidak bersambung */
            }
            .print-slips .slip-card:last-child { page-break-after: auto; }

            /* Keseluruhan Kelas Landscape */
            @page { margin: 10mm; }
            .print-landscape {
                display: block !important;
            }
            .print-landscape @page { size: landscape; }
        }
    </style>
</head>
<body>

    <!-- HEADER KORPORAT -->
    <div class="main-header" id="mainHeader">
        <img src="https://i.ibb.co/VYSKMXf1/Logo-Selirik.png" alt="Logo SMK Selirik" class="logo">
        <h1>SMK SELIRIK, KAPIT</h1>
        <h2>TAHUN 2026</h2>
    </div>

    <!-- LOG MASUK GURU -->
    <div class="login-container" id="loginBox">
        <h2>Dashboard Guru Kelas</h2>
        <input type="text" id="userid" placeholder="Sila masukkan ID Pengguna (GT2026)">
        <input type="password" id="password" placeholder="Sila masukkan Kata Laluan">
        <button onclick="logMasuk()">Log Masuk</button>
        <p id="loginError" style="color: red; display: none; font-size: 14px; margin-top:10px;">ID atau Kata Laluan salah!</p>
    </div>

    <!-- DASHBOARD UTAMA -->
    <div class="dashboard-container" id="dashboard">
        
        <div class="controls-card">
            <h3>Kawalan Guru Kelas</h3>
            <p>Sila pilih kelas anda untuk memuat turun / memaparkan data (Berdasarkan data SUMATIF 2 - TEMP):</p>
            <select id="classSelector" onchange="pilihKelas()">
                <option value="">-- Pilih Kelas --</option>
                <!-- Opsyen kelas akan dijana di sini melalui JavaScript selepas data dimuat (Demonstrasi) -->
                <option value="4SN">4SN</option>
                <option value="5SN">5SN</option>
                <option value="3A1">3A1</option>
            </select>

            <div class="print-controls" id="printControls" style="display:none;">
                <button class="action-btn" onclick="cetakIndividu()">Cetak Slip Individu</button>
                <button class="action-btn" onclick="cetakPukal()">Cetak Pukal Slip Kelas</button>
                <button class="action-btn" onclick="cetakKeseluruhan()">Cetak Keseluruhan (Landscape)</button>
            </div>
        </div>

        <!-- CONTAINER UNTUK SLIP -->
        <div id="slipsContainer" class="print-slips"></div>

        <!-- CONTAINER UNTUK KESELURUHAN (LANDSCAPE) -->
        <div id="summaryContainer" class="summary-table-container"></div>

    </div>

    <!-- FOOTER -->
    <div class="main-footer" id="mainFooter">
        &copy; Hakcipta NDJE@Selirik, Kapit 2026
    </div>

    <script>
        // PENGESAHAN LOG MASUK
        function logMasuk() {
            var id = document.getElementById("userid").value;
            var pass = document.getElementById("password").value;

            if(id === "GT2026" && pass === "GT2026") {
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
            } else {
                document.getElementById("loginError").style.display = "block";
            }
        }

        // --- NOTA PEMBANGUN --- 
        // Data CSV yang dimuat turun dari Google Sheets mempunyai format Column (A=0, B=1, C=2 ... ).
        // Ini adalah struktur MOCK/PLACEHOLDER logic untuk menunjukkan kefungsian penuh paparan,
        // penapisan 'NULL', pemetaan subjek berpandukan Tingkatan (Atas vs Bawah), dan pemetaan kolum.
        
        // Pemetaan Subjek Ringkas untuk Cetakan Keseluruhan
        const subjekRingkas = {
            "BAHASA MELAYU": "BM", "SEJARAH": "SEJ", "ENGLISH LANGUAGE": "ENG", 
            "MATEMATIK": "MATHS", "MATEMATIK/MATHEMATICS": "MATHS", "PENDIDIKAN MORAL": "PM",
            "PENDIDIKAN ISLAM": "PI", "SAINS": "SN", "PENDIDIKAN SENI VISUAL": "PSV",
            "BAHASA IBAN": "BIB", "REKA CIPTA": "RC", "PENGAJIAN PENIAGAAN": "PP",
            "PHYSICS": "FIZ", "CHEMISTRY": "KIM", "BIOLOGY": "BIO", 
            "ADDITIONAL MATHEMATICS": "ADD MATHS", "SAINS KOMPUTER": "SK", 
            "KIMPALAN ARKA & GAS": "KAG", "PENDIDIKAN JASMANI & PENDIDIKAN KESIHATAN": "PJPK",
            "PENDIDIKAN JASAMANI & PENDIDIKAN KESIHATAN": "PJPK",
            "GEOGRAFI": "GEO", "REKA BENTUK & TEKNOLOGI": "RBT", "ASAS SAINS KOMPUTER": "ASK"
        };

        // Memaparkan maklumat sebaik kelas dipilih
        function pilihKelas() {
            const selectedClass = document.getElementById("classSelector").value;
            const printControls = document.getElementById("printControls");
            
            if(selectedClass === "") {
                printControls.style.display = "none";
                document.getElementById("slipsContainer").innerHTML = "";
                document.getElementById("summaryContainer").style.display = "none";
                return;
            }

            printControls.style.display = "flex";
            
            // --- CONTOH PENJANAAN DATA MOCK BERDASARKAN RULES ---
            // Dalam aplikasi sebenar, di sini anda akan `fetch(url)` ke CSV link Google Sheets (SUMATIF 2 TEMP)
            // menapis data mengikut 'Kolum D' (Kelas), mendapat Nama dari 'Kolum C'.
            janaPaparan(selectedClass);
        }

        function janaPaparan(className) {
            const slipsContainer = document.getElementById("slipsContainer");
            slipsContainer.innerHTML = ""; // Reset

            // Data simulasi pelajar (Dalam praktikal ini diekstrak dari CSV menggunakan Indexing)
            const mockStudents = [
                { nama: "ALEXANDER GILL", markahBM: 78, gredBM: "B+", markahSej: 65, gredSej: "C+", markahMath: "NULL", gredMath: "NULL", jumMarkah: 143, purata: 71.5, gp: 3.5, kdk: 1, kdt: 12, jumTing: 253, guru: "CIKGU AMIR" },
                { nama: "JESSICA WONG", markahBM: 85, gredBM: "A", markahSej: 90, gredSej: "A+", markahMath: 70, gredMath: "B", jumMarkah: 245, purata: 81.6, gp: 2.1, kdk: 2, kdt: 5, jumTing: 253, guru: "CIKGU AMIR" }
            ];

            let htmlSlips = "";
            let htmlTable = `<h3 style="text-align:center;">Jadual Keputusan Keseluruhan Kelas: ${className}</h3>
                             <table>
                                <tr>
                                    <th>NAMA PELAJAR</th>
                                    <th>${subjekRingkas["BAHASA MELAYU"]}</th>
                                    <th>${subjekRingkas["SEJARAH"]}</th>
                                    <th>${subjekRingkas["MATEMATIK"]}</th>
                                    <th>KDK</th>
                                    <th>KDT</th>
                                </tr>`;

            mockStudents.forEach((student) => {
                // Bina Jadual Subjek Individu (Abaikan NULL)
                let subjekIndividu = "";
                if(student.markahBM !== "NULL") subjekIndividu += `<tr><td>BAHASA MELAYU</td><td>${student.markahBM}</td><td>${student.gredBM}</td></tr>`;
                if(student.markahSej !== "NULL") subjekIndividu += `<tr><td>SEJARAH</td><td>${student.markahSej}</td><td>${student.gredSej}</td></tr>`;
                if(student.markahMath !== "NULL") subjekIndividu += `<tr><td>MATEMATIK</td><td>${student.markahMath}</td><td>${student.gredMath}</td></tr>`;

                // Bina Kad Slip
                htmlSlips += `
                <div class="slip-card">
                    <img src="https://i.ibb.co/9mL8CNMW/header-SLIP-KEPUTUSAN-PEPERIKSAAN.png" alt="Header Slip Peperiksaan" class="slip-header-img">
                    <div class="slip-content">
                        <div class="student-info">
                            <div>
                                <strong>Nama:</strong> ${student.nama}<br>
                                <strong>Kelas:</strong> ${className}
                            </div>
                            <div style="text-align: right;">
                                <strong>Peperiksaan:</strong> Sumatif 2 (Mei)<br>
                                <strong>Kedudukan Kelas:</strong> ${student.kdk} | <strong>Kedudukan Tingkatan:</strong> ${student.kdt}/${student.jumTing}
                            </div>
                        </div>

                        <table>
                            <tr>
                                <th style="width: 50%;">SUBJEK</th>
                                <th style="width: 25%;">MARKAH</th>
                                <th style="width: 25%;">GRED</th>
                            </tr>
                            ${subjekIndividu}
                        </table>

                        <div style="background: #f1f1f1; padding: 15px; border-radius: 8px;">
                            <strong>Jumlah Markah:</strong> ${student.jumMarkah} &nbsp;|&nbsp;
                            <strong>Purata:</strong> ${student.purata} &nbsp;|&nbsp;
                            <strong>Gred Purata (GP):</strong> ${student.gp}
                        </div>

                        <div class="signatures">
                            <div class="sign-box">
                                <div class="sign-line"></div>
                                <strong>AWIN ANAK ENGGA</strong><br>
                                PENGETUA<br>
                                SMK SELIRIK
                            </div>
                            <div class="sign-box">
                                <div class="sign-line"></div>
                                <strong>${student.guru}</strong><br>
                                Guru Tingkatan ${className}<br>
                                SMK SELIRIK
                            </div>
                        </div>
                    </div>
                </div>`;

                // Bina baris jadual keseluruhan
                htmlTable += `<tr>
                                <td>${student.nama}</td>
                                <td>${student.markahBM !== 'NULL' ? student.markahBM : '-'}</td>
                                <td>${student.markahSej !== 'NULL' ? student.markahSej : '-'}</td>
                                <td>${student.markahMath !== 'NULL' ? student.markahMath : '-'}</td>
                                <td>${student.kdk}</td>
                                <td>${student.kdt}/${student.jumTing}</td>
                              </tr>`;
            });

            htmlTable += `</table>`;

            document.getElementById("slipsContainer").innerHTML = htmlSlips;
            document.getElementById("summaryContainer").innerHTML = htmlTable;
        }

        // FUNGSI CETAKAN
        function cetakPukal() {
            document.getElementById("summaryContainer").style.display = "none";
            document.getElementById("slipsContainer").style.display = "block";
            window.print();
        }

        function cetakIndividu() {
            alert("Untuk cetakan individu, sistem akan membenarkan guru memilih pelajar spesifik. Dalam mod ini, cetak pukal dipanggil tetapi anda boleh set page range semasa window print muncul.");
            cetakPukal();
        }

        function cetakKeseluruhan() {
            document.getElementById("slipsContainer").style.display = "none";
            document.getElementById("summaryContainer").style.display = "block";
            // Set css spesifik print untuk jadual landskap
            document.body.classList.add("print-landscape");
            window.print();
            
            // Reset semula paparan selepas print tutup
            setTimeout(() => {
                document.body.classList.remove("print-landscape");
                document.getElementById("slipsContainer").style.display = "block";
                document.getElementById("summaryContainer").style.display = "none";
            }, 1000);
        }
    </script>
</body>
</html>
